<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inscrição</title>

    
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <form id="form-inscricao">

        <h2>Formulário de Inscrição</h2>

        <label for="nome">Nome:</label>
        <input type="text" id="nome">

        <label for="idade">Idade:</label>
        <input type="number" id="idade">

        <label for="nivel">Nível de experiência (1 a 10):</label>
        <input type="number" id="nivel" min="1" max="10">

        <label for="senha1">Senha:</label>
        <input type="password" id="senha1">

        <label for="senha2">Confirmar Senha:</label>
        <input type="password" id="senha2">

        <label>
            <input type="checkbox" id="estudante">
            É estudante
        </label>

        <button type="button" onclick="validar()">Validar Inscrição</button>

        <p id="mensagem"></p>

    </form>

    <script src="../javascript/script.js"></script>

</body>

</html>
